<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>React Basics</title>
    </head>
    <body>

        <div class="js-container"></div>
        <script src="https://unpkg.com/supersimpledev/dayjs.js">
            
        </script>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel"> 
      const container = document.querySelector('.js-container');
      const socks = 10;
      const T_shirts= 8;
      const productCost = socks+T_shirts*2;
      const shippingCost = 56;
      let total = shippingCost + productCost;
      
           const date = dayjs().format('MMMM D');
      
    
     const root =  ReactDOM.createRoot(container);

     setInterval(() => {
        const time =  <p>Current time is : {dayjs().format('HH:mm:ss')}</p> 
          const div = (
        <div>
            <p>Today is {date}</p>
           {time}
            <p>Product cost:${productCost}</p>
            <p>Shipping cost: ${shippingCost}</p>
            <p>Total: ${total}</p>
            <button>Place your order</button>
            
        </div>
    );
        root.render(div);
     }, 1000);

    </script>
    </body>
</html>
