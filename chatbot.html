<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Chatbot</title>
    </head>
    <body>

        <div class="js-container"></div>
        <!-- import dayjs library -->
        <script src="https://unpkg.com/supersimpledev/dayjs.js">
          
        </script>
        <!-- import react library -->

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel"> 

        function ChatBot(){
            return(
                <>
                    <input placeholder="Send a message to ChatBot" size="30"/>
                    <button>Spend</button>
                </>
            )  
        }
        function ChatMessage({message, sender}){
            if(sender === 'robot'){
                return(
                     <div>
                         <img src="chatbot.png" width="50"/>
                        {message}
                    </div>
                )
            }
            return(
                <div>
                    {message}
                    <img src="sontungmtp.jpg" width="50"/>
                </div>
            )
        }
        
          const app = (
                <>
                    <ChatBot />
                    <ChatMessage message="Hello Chatbot" sender="user"/>
                    <ChatMessage message="Hello! How can i help you" sender="robot"/>
                    <ChatMessage message="Get date" sender="user"/>
                    <ChatMessage message="Today is June 9" sender="robot"/>
                </>  
          ) ; 


      const container = document.querySelector('.js-container');
         const root =  ReactDOM.createRoot(container);
        root.render(app);

    </script>
    </body>
</html>
