<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
    <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      display: flex;
      align-items: center;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.robot {
      justify-content: flex-start;
    }

    .message img {
      border-radius: 50%;
      margin: 0 8px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ddd;
      background: #fafafa;
    }

    .input-area input {
      flex: 1;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
    }

    .input-area button {
      margin-left: 10px;
      padding: 8px 12px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .input-area button:hover {
      background: #357ab8;
    }
  </style>
  </head>

  <body>
    <div class="js-container"></div>
    <!-- import dayjs library -->
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <!-- import react library -->

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

//This place display Input Chat
      function ChatInput({chatMessages, setChatMessages}) {

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage(){
          if(inputText.trim() === '') return;
            const newChatMessages = ([
                ...chatMessages,
                {
                    message: inputText,
                    sender: 'user',
                    id: crypto.randomUUID()
                }

            ])
            setInputText('');
            const response = Chatbot.getResponse(inputText);
            setChatMessages([
                ...newChatMessages,
                {
                    message: response,
                    sender: 'robot',
                    id: crypto.randomUUID()
                }

            ])
        }

        function handleKeyDown(event){
          if(event.key === 'Enter'){
            sendMessage();
          }
        }
        return (
          <div className="input-area">
      <input
        onKeyDown={handleKeyDown}
        onChange={saveInputText}
        placeholder="Send a message to ChatBot"
        value={inputText}
      />
      <button onClick={sendMessage}>Send</button>
    </div>
        );
      }

//This  place is display and  logic of chat messages
      function ChatMessage({ message, sender }) {
       return (
    <div className={`message ${sender}`}>
      {sender === "robot" && <img src="chatbot.png" width="40" />}
      <span>{message}</span>
      {sender === "user" && <img src="sontungmtp.jpg" width="40" />}
    </div>
  );
      }

//This place contains loop chat ms
    function ChatMessages({chatMessages}){
      //create ref
      const messageEndRef = React.useRef(null);
      React.useEffect(()=>{
        messageEndRef.current?.scrollIntoView({behavier: "smooth"});

      },[chatMessages])
       return <div className="messages">
    {chatMessages.map(chatMessage => (
      <ChatMessage
        message={chatMessage.message}
        sender={chatMessage.sender}
        key={chatMessage.id}
      />
    ))}
    <div ref={messageEndRef} />
  </div>
    }

      function App() {
         const [chatMessages,setChatMessages] = React.useState( [
          {
            message: "Hello Chatbot",
            sender: "user",
            id: 'id1'
          },
          {
            message: "Hello! How can i help you",
            sender: "robot",
             id: 'id2'
          },
          {
            message: "Get data",
            sender: "user",
             id: 'id3'
          },
          {
            message: "Today is June 9",
            sender: "robot",
             id: 'id4'
          },
        ])
       return (
    <div className="chat-container">
      <ChatMessages chatMessages={chatMessages}/>
      <ChatInput chatMessages={chatMessages} setChatMessages={setChatMessages}/>
    </div>
  );
      }
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
