<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>
    <!-- import dayjs library -->
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <!-- import react library -->

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

//This place display Input Chat
      function ChatInput({chatMessages, setChatMessages}) {

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event){
          setInputText(event.target.value);
        }

        function sendMessage(){
          if(inputText.trim() === '') return;
            const newChatMessages = ([
                ...chatMessages,
                {
                    message: inputText,
                    sender: 'user',
                    id: crypto.randomUUID()
                }

            ])
            setInputText('');
            const response = Chatbot.getResponse(inputText);
            setChatMessages([
                ...newChatMessages,
                {
                    message: response,
                    sender: 'robot',
                    id: crypto.randomUUID()
                }

            ])
        }

        function handleKeyDown(event){
          if(event.key === 'Enter'){
            sendMessage();
          }
        }
        return (
          <>
            <input
            onKeyDown={handleKeyDown}
            onChange={saveInputText}
            placeholder="Send a message to ChatBot" size="30" 
            value={inputText}
            />

            <button onClick={sendMessage} >
              Send
              </button>
          </>
        );
      }

//This  place is display and  logic of chat messages
      function ChatMessage({ message, sender }) {
        return (
          <div>
            {sender === "robot" && <img src="chatbot.png" width="50" />}
            {message}
            {sender === "user" && <img src="sontungmtp.jpg" width="50" />}
          </div>
        );
      }

//This place contains loop chat ms
    function ChatMessages({chatMessages}){
      
        return(
            <>
         {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
            </>
        )
    }

      function App() {
         const [chatMessages,setChatMessages] = React.useState( [
          {
            message: "Hello Chatbot",
            sender: "user",
            id: 'id1'
          },
          {
            message: "Hello! How can i help you",
            sender: "robot",
             id: 'id2'
          },
          {
            message: "Get data",
            sender: "user",
             id: 'id3'
          },
          {
            message: "Today is June 9",
            sender: "robot",
             id: 'id4'
          },
        ])
        return (
          <>
            <ChatInput 
            chatMessages = {chatMessages}
            setChatMessages = {setChatMessages}
            />
           <ChatMessages
            chatMessages = {chatMessages}
           />
          </>
        );
      }
s
      const container = document.querySelector(".js-container");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
